advanced_image_style_warmer.settings:
  type: config_object
  label: 'Advanced Image Style Warmer settings'
  mapping:
    styles:
      type: mapping
      label: 'Per-image-style warming behaviour'
      mapping:
        '*':
          type: mapping
          label: 'Style configuration'
          mapping:
            immediate:
              type: boolean
              label: 'Warm immediately on file save'
            queue:
              type: boolean
              label: 'Warm via background queue'
